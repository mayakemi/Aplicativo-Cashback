<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Cashback</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Calculadora de Cashback</h1>
      <form id="cashback-form">
        <label for="client_type">Tipo de cliente</label>
        <select id="client_type" required>
          <option value="regular">Regular</option>
          <option value="vip">VIP</option>
        </select>

        <label for="purchase_amount">Valor da compra (R$)</label>
        <input id="purchase_amount" type="number" min="0.01" step="0.01" required />

        <label for="discount_percent">Cupom de desconto (%)</label>
        <input id="discount_percent" type="number" min="0" max="100" step="0.01" required />

        <button type="submit">Calcular</button>
      </form>

      <section id="result" class="result hidden"></section>

      <section>
        <h2>Meu histórico (por IP)</h2>
        <table>
          <thead>
            <tr>
              <th>Data</th>
              <th>Cliente</th>
              <th>Compra</th>
              <th>Desconto</th>
              <th>Final</th>
              <th>Cashback</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
